name: Build and Push to ACR

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: main
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2 # Atualizei para v2, que é mais estável para OIDC
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Docker Login to ACR
        # Precisamos disto para o 'docker push' funcionar
        run: az acr login --name acrterraform

      - name: Build and Push to ACR (Local Build)
        run: |
          # 1. Construir a imagem localmente no Runner do GitHub
          docker build -t acrterraform.azurecr.io/acrterraform:${{ github.sha }} .
          
          # 2. Enviar a imagem para o Azure Container Registry
          docker push acrterraform.azurecr.io/acrterraform:${{ github.sha }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./azure-main
        run: terraform init

      - name: Terraform Apply
        working-directory: ./azure-main
        # Adicionei estas env vars para o Terraform usar o login do passo anterior automaticamente
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_USE_OIDC: true
        run: terraform apply -auto-approve -var="image_tag=${{ github.sha }}"